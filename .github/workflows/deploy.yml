name: CI/CD - Deploy to Render

on:
  push:
    branches:
      - deploy
    paths:
      - "mf-api/**"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches:
      - deploy
      - main
    paths:
      - "mf-api/**"

jobs:
  build-check:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "mf-api/package-lock.json"

      - name: Install dependencies
        run: npm install
        working-directory: ./mf-api

      - name: Generate Prisma Client
        # We provide a dummy DATABASE_URL for Prisma 7 build check
        run: npx prisma generate
        working-directory: ./mf-api
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Build TypeScript
        run: npm run build
        working-directory: ./mf-api
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

  deploy:
    name: Trigger Render Deployment
    needs: build-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/deploy'
    runs-on: ubuntu-latest
    steps:
      - name: Call Render Deploy Hook
        run: |
          curl -f "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
