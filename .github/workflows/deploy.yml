name: CI/CD - Deploy to Render

on:
  push:
    branches:
      - deploy
    paths:
      - "mf-api/**"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches:
      - deploy
    paths:
      - "mf-api/**"

jobs:
  build-and-test:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "mf-api/package-lock.json"

      - name: Install dependencies
        run: npm install
        working-directory: ./mf-api

      - name: Build
        run: npm run build
        working-directory: ./mf-api

  deploy:
    name: Trigger Render Deployment
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/deploy'
    runs-on: ubuntu-latest
    steps:
      - name: Call Render Deploy Hook
        run: |
          curl -f "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
