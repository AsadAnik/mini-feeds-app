services:
  - type: web
    name: mini-feeds-api
    runtime: docker
    dockerfilePath: Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mini-feeds-db
          property: connectionString

databases:
  - name: mini-feeds-db
    plan: free
    region: singapore
